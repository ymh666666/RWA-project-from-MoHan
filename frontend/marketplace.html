<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoHan - 资产市场 | Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #0f172a;
            --primary-blue: #2563eb;
            --accent-cyan: #06b6d4;
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-light: #64748b;
            --border-color: #e2e8f0;
            --shadow-md: 0 4px 20px rgba(37, 99, 235, 0.08);
            --shadow-hover: 0 10px 30px rgba(37, 99, 235, 0.15);
            --radius: 12px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body.dark {
            --bg-light: #0f172a;
            --card-bg: #1e293b;
            --text-main: #e2e8f0;
            --text-light: #94a3b8;
            --border-color: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            color: var(--text-main);
            background: var(--bg-light);
            line-height: 1.7;
            font-size: 16px;
            transition: background 0.2s, color 0.2s;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        body[data-lang="en"] .lang-zh { display: none !important; }
        body:not([data-lang="en"]) .lang-en { display: none !important; }
        
        header {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        body.dark header { background: rgba(15,23,42,0.92); }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            min-height: 70px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--primary-dark); text-decoration: none; cursor: default; }
        body.dark .logo { color: white; }
        .nav-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .lang-btn, .theme-toggle, .back-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 20px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .lang-btn:hover, .theme-toggle:hover, .back-btn:hover {
            border-color: var(--primary-blue);
            color: var(--primary-blue);
        }
        
        main { padding: 32px 0 60px; }
        .page-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 24px; }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            align-items: center;
        }
        .filter-group { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .filter-group label { font-weight: 600; color: var(--text-light); font-size: 0.85rem; }
        .filter-group select, .filter-group input {
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: var(--bg-light);
            color: var(--text-main);
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }
        .reset-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            margin-left: auto;
        }
        .reset-btn:hover { background: #dc2626; }
        
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .asset-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            padding: 24px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
            cursor: pointer;
        }
        .asset-card:hover {
            transform: translateY(-6px);
            border-color: var(--primary-blue);
            box-shadow: var(--shadow-hover);
        }
        .asset-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: var(--primary-blue);
            margin-bottom: 16px;
        }
        body.dark .asset-icon { background: rgba(37,99,235,0.2); }
        .asset-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
        .asset-type, .asset-location {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 6px;
            display: inline-block;
            margin-right: 12px;
        }
        .asset-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        .asset-yield { color: #10b981; font-weight: 700; }
        .asset-price { font-weight: 700; }
        .no-results { text-align: center; padding: 60px; color: var(--text-light); }
        
        footer {
            background: var(--primary-dark);
            color: #94a3b8;
            padding: 40px 0 24px;
            margin-top: 60px;
            text-align: center;
            font-size: 14px;
        }
        footer a { color: #94a3b8; text-decoration: none; }
        footer a:hover { color: white; }
        
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .reset-btn { margin-left: 0; }
            .asset-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 640px) {
            .header-inner { flex-direction: column; gap: 12px; padding: 12px 16px; }
            .back-btn, .theme-toggle, .lang-btn { font-size: 12px; padding: 4px 10px; }
            .page-title { font-size: 1.4rem; }
            .filter-bar { flex-direction: column; align-items: stretch; padding: 16px; gap: 12px; }
            .filter-group { flex-direction: column; align-items: stretch; gap: 6px; }
            .filter-group select, .filter-group input { width: 100%; padding: 8px 12px; }
            .reset-btn { margin-left: 0; width: 100%; }
            .asset-grid { gap: 16px; }
            .asset-card { padding: 16px; }
            .asset-icon { width: 48px; height: 48px; font-size: 1.4rem; }
            .asset-name { font-size: 1rem; }
            .asset-stats { flex-direction: column; gap: 4px; }
        }
    </style>
</head>
<body>
<script>
    (function() {
        let theme = localStorage.getItem('mohan_theme');
        if (theme === 'dark') document.body.classList.add('dark');
        let lang = localStorage.getItem('mohan_lang');
        if (lang === 'en') document.body.setAttribute('data-lang', 'en');
        else document.body.setAttribute('data-lang', 'zh');
    })();
    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark');
        localStorage.setItem('mohan_theme', isDark ? 'dark' : 'light');
    }
    function toggleLanguage() {
        const newLang = document.body.getAttribute('data-lang') === 'zh' ? 'en' : 'zh';
        document.body.setAttribute('data-lang', newLang);
        localStorage.setItem('mohan_lang', newLang);
        location.reload();
    }
</script>

<header>
    <div class="container header-inner">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> <span class="lang-zh">返回仪表盘</span><span class="lang-en">Back to Dashboard</span></a>
        <a href="#" class="logo" style="cursor: default;">MoHan</a>
        <div class="nav-right">
            <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i> <span class="lang-zh">暗色</span><span class="lang-en">Dark</span></button>
            <button class="lang-btn" onclick="toggleLanguage()">中 / EN</button>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <h1 class="page-title"><span class="lang-zh">🏛️ 资产市场</span><span class="lang-en">🏛️ Asset Marketplace</span></h1>
        
        <div class="filter-bar">
            <div class="filter-group">
                <label><span class="lang-zh">资产类型</span><span class="lang-en">Type</span>:</label>
                <select id="filterType">
                    <option value="all"><span class="lang-zh">全部</span><span class="lang-en">All</span></option>
                    <option value="商业地产">🏢 <span class="lang-zh">商业地产</span><span class="lang-en">Commercial RE</span></option>
                    <option value="特殊动产">✈️ <span class="lang-zh">特殊动产</span><span class="lang-en">Movable Property</span></option>
                    <option value="生产经营资产">⚡ <span class="lang-zh">生产经营资产</span><span class="lang-en">Production Asset</span></option>
                    <option value="知识产权">💡 <span class="lang-zh">知识产权</span><span class="lang-en">IP</span></option>
                </select>
            </div>
            <div class="filter-group">
                <label><span class="lang-zh">所在地</span><span class="lang-en">Location</span>:</label>
                <select id="filterLocation">
                    <option value="all"><span class="lang-zh">全部</span><span class="lang-en">All</span></option>
                    <option value="美国">🇺🇸 美国</option>
                    <option value="欧洲">🇪🇺 欧洲</option>
                    <option value="亚洲">🌏 亚洲</option>
                    <option value="全球">🌍 全球</option>
                </select>
            </div>
            <div class="filter-group">
                <label><span class="lang-zh">搜索</span><span class="lang-en">Search</span>:</label>
                <input type="text" id="filterSearch" placeholder="资产名称" style="min-width: 150px;">
            </div>
            <button class="reset-btn" id="resetFilters"><span class="lang-zh">重置筛选</span><span class="lang-en">Reset</span></button>
        </div>
        
        <div id="assetsContainer" class="asset-grid"></div>
    </div>
</main>

<footer>
    <div class="container">
        <p>© 2026 MoHan RWA Platform. <span class="lang-zh">保留所有权利。</span><span class="lang-en">All rights reserved.</span></p>
    </div>
</footer>

<script>
    const assetsData = [
        { id: 1, nameZh: "曼哈顿中心写字楼", nameEn: "Manhattan Center Tower", type: "商业地产", location: "美国", yield: 6.8, price: 10.25, icon: "fa-building", valuation: "$1.2亿" },
        { id: 2, nameZh: "波音787-9 航空器", nameEn: "Boeing 787-9 Aircraft", type: "特殊动产", location: "美国", yield: 5.2, price: 9.87, icon: "fa-ship", valuation: "$1.5亿" },
        { id: 3, nameZh: "光伏电站特许经营权", nameEn: "Solar Farm Concession", type: "生产经营资产", location: "美国", yield: 7.5, price: 10.02, icon: "fa-charging-station", valuation: "$8000万" },
        { id: 4, nameZh: "AI 专利组合", nameEn: "AI Patent Portfolio", type: "知识产权", location: "全球", yield: 9.0, price: 10.15, icon: "fa-lightbulb", valuation: "$5000万" },
        { id: 5, nameZh: "伦敦金融城写字楼", nameEn: "London Financial District Office", type: "商业地产", location: "欧洲", yield: 6.2, price: 9.50, icon: "fa-building", valuation: "$9500万" },
        { id: 6, nameZh: "空客A330 航空器", nameEn: "Airbus A330 Aircraft", type: "特殊动产", location: "欧洲", yield: 5.5, price: 9.20, icon: "fa-ship", valuation: "$1.2亿" },
        { id: 7, nameZh: "新加坡数据中心", nameEn: "Singapore Data Center", type: "生产经营资产", location: "亚洲", yield: 8.2, price: 11.00, icon: "fa-server", valuation: "$1.1亿" },
        { id: 8, nameZh: "半导体专利组合", nameEn: "Semiconductor Patent Portfolio", type: "知识产权", location: "亚洲", yield: 7.8, price: 9.80, icon: "fa-microchip", valuation: "$6800万" },
        { id: 9, nameZh: "东京银座商业楼", nameEn: "Tokyo Ginza Commercial Building", type: "商业地产", location: "亚洲", yield: 5.9, price: 8.80, icon: "fa-building", valuation: "$8800万" },
        { id: 10, nameZh: "海上风电场", nameEn: "Offshore Wind Farm", type: "生产经营资产", location: "欧洲", yield: 7.0, price: 9.50, icon: "fa-fan", valuation: "$1.0亿" }
    ];

    function renderAssets() {
        const isZh = document.body.getAttribute('data-lang') === 'zh';
        const typeFilter = document.getElementById('filterType').value;
        const locationFilter = document.getElementById('filterLocation').value;
        const searchTerm = document.getElementById('filterSearch').value.toLowerCase();
        
        let filtered = assetsData.filter(asset => {
            if (typeFilter !== 'all' && asset.type !== typeFilter) return false;
            if (locationFilter !== 'all' && asset.location !== locationFilter) return false;
            if (searchTerm) {
                const name = isZh ? asset.nameZh.toLowerCase() : asset.nameEn.toLowerCase();
                if (!name.includes(searchTerm)) return false;
            }
            return true;
        });
        
        const container = document.getElementById('assetsContainer');
        if (filtered.length === 0) {
            container.innerHTML = `<div class="no-results"><span class="lang-zh">没有找到符合条件的资产</span><span class="lang-en">No assets found</span></div>`;
            return;
        }
        
        container.innerHTML = filtered.map(asset => {
            const name = isZh ? asset.nameZh : asset.nameEn;
            const type = isZh ? asset.type : (asset.type === '商业地产' ? 'Commercial RE' : asset.type === '特殊动产' ? 'Movable' : asset.type === '生产经营资产' ? 'Production' : 'IP');
            const location = asset.location;
            return `
                <div class="asset-card" data-id="${asset.id}">
                    <div class="asset-icon"><i class="fas ${asset.icon}"></i></div>
                    <div class="asset-name">${name}</div>
                    <div>
                        <span class="asset-type"><i class="fas fa-tag"></i> ${type}</span>
                        <span class="asset-location"><i class="fas fa-map-marker-alt"></i> ${location}</span>
                    </div>
                    <div class="asset-stats">
                        <span class="asset-yield">📈 ${asset.yield}%</span>
                        <span class="asset-price">💰 $${asset.price}/代币</span>
                    </div>
                    <div style="font-size:0.7rem; color:var(--text-light); margin-top:8px;">${isZh ? '估值' : 'Valuation'}: ${asset.valuation}</div>
                </div>
            `;
        }).join('');
        
        // 使用 sessionStorage 传递 ID，而不是 URL 参数
        document.querySelectorAll('.asset-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const id = card.dataset.id;
                sessionStorage.setItem('selectedAssetId', id);
                window.location.href = 'asset-detail.html';
            });
        });
    }

    document.getElementById('filterType').addEventListener('change', renderAssets);
    document.getElementById('filterLocation').addEventListener('change', renderAssets);
    document.getElementById('filterSearch').addEventListener('input', renderAssets);
    document.getElementById('resetFilters').addEventListener('click', () => {
        document.getElementById('filterType').value = 'all';
        document.getElementById('filterLocation').value = 'all';
        document.getElementById('filterSearch').value = '';
        renderAssets();
    });
    
    renderAssets();
    
    const observer = new MutationObserver(() => renderAssets());
    observer.observe(document.body, { attributes: true, attributeFilter: ['data-lang'] });
</script>
</body>
</html>
