<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoHan · 后台管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== 全局样式 ========== */
        :root {
            --primary-dark: #0f172a;
            --primary-blue: #2563eb;
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-light: #64748b;
            --border-color: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
            --sidebar-width: 240px;
            --header-height: 70px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --transition: 0.25s ease;
        }
        body.dark {
            --bg-light: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-light: #94a3b8;
            --border-color: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-light);
            color: var(--text-main);
            transition: background var(--transition), color var(--transition);
            display: flex;
            min-height: 100vh;
            margin: 0;
        }
        body[data-lang="en"] .lang-zh { display: none !important; }
        body:not([data-lang="en"]) .lang-en { display: none !important; }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            padding: 24px 0;
            overflow-y: auto;
            z-index: 1000;
            transition: transform var(--transition);
        }
        .sidebar .brand {
            font-size: 1.4rem;
            font-weight: 800;
            padding: 0 24px 24px;
            border-bottom: 1px solid var(--border-color);
            color: var(--primary-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        body.dark .sidebar .brand { color: #fff; }
        .sidebar .brand i { display: none; } /* 隐藏图标，只留文字 */
        .sidebar nav { padding-top: 16px; }
        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 24px;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            border-left: 3px solid transparent;
            font-size: 0.95rem;
        }
        .sidebar nav a:hover {
            background: rgba(37,99,235,0.06);
            color: var(--primary-blue);
        }
        .sidebar nav a.active {
            color: var(--primary-blue);
            border-left-color: var(--primary-blue);
            background: rgba(37,99,235,0.08);
        }
        .sidebar nav a i { width: 22px; text-align: center; font-size: 1.1rem; }

        /* ========== 主内容区 ========== */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 24px 32px 40px;
            min-height: 100vh;
        }

        /* ========== 顶栏 ========== */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
        }
        .topbar h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .topbar .actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .topbar .actions button,
        .topbar .actions a {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 7px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-main);
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .topbar .actions button:hover,
        .topbar .actions a:hover {
            border-color: var(--primary-blue);
            color: var(--primary-blue);
        }

        /* ========== 统计卡片 ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px 24px;
            transition: 0.2s;
        }
        .stat-card:hover { border-color: var(--primary-blue); }
        .stat-card .label {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 4px;
            line-height: 1.2;
        }
        .stat-card .sub {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 8px;
        }

        /* ========== 面板容器 ========== */
        .panel {
            display: none;
            animation: fadeUp 0.3s ease;
        }
        .panel.active { display: block; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .panel-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .panel-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            background: var(--bg-light);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }
        .btn-primary {
            background: var(--primary-blue);
            color: #fff;
            border-color: var(--primary-blue);
        }
        .btn-primary:hover {
            background: #1e40af;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37,99,235,0.25);
        }
        .btn-danger {
            background: #ef4444;
            color: #fff;
            border-color: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-sm { padding: 4px 14px; font-size: 0.78rem; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
        }

        /* ========== 搜索框 ========== */
        .search-input {
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: var(--bg-light);
            color: var(--text-main);
            font-size: 0.85rem;
            min-width: 180px;
            transition: 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        /* ========== 表格 ========== */
        .table-wrap {
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            padding: 4px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 600px;
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            font-weight: 600;
            color: var(--text-light);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        tr:last-child td { border-bottom: none; }
        .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: capitalize;
        }
        .status-badge.ico { background: #f59e0b; color: #fff; }
        .status-badge.trading { background: #10b981; color: #fff; }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 540px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.96) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal h3 {
            font-size: 1.4rem;
            margin-bottom: 24px;
            font-weight: 700;
        }
        .modal .form-group {
            margin-bottom: 16px;
        }
        .modal label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.85rem;
            color: var(--text-light);
        }
        .modal input, .modal select, .modal textarea {
            width: 100%;
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: var(--bg-light);
            color: var(--text-main);
            font-size: 0.95rem;
            font-family: inherit;
            transition: 0.2s;
        }
        .modal input:focus, .modal select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .modal .btn-row {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        .empty-state i { font-size: 3rem; opacity: 0.3; margin-bottom: 12px; }

        /* ========== 移动端响应式 ========== */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 260px;
            }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; }
            .topbar h1 { font-size: 1.4rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .modal { padding: 24px; }
            .search-input { min-width: 120px; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .topbar .actions button span { display: none; }
            .topbar .actions button i { margin-right: 0; }
        }

        /* ========== 汉堡菜单按钮（移动端） ========== */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.6rem;
            color: var(--text-main);
            cursor: pointer;
            padding: 4px 8px;
        }
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 999;
            display: none;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>
    <!-- 遮罩层（移动端侧栏） -->
    <div class="overlay" id="sidebarOverlay"></div>

    <!-- ===== 侧边栏 ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <!-- 删除了图标，只留文字 -->
            MoHan
        </div>
        <nav>
            <a href="#" class="active" data-panel="dashboard"><i class="fas fa-chart-pie"></i> <span class="lang-zh">仪表盘</span><span class="lang-en">Dashboard</span></a>
            <a href="#" data-panel="users"><i class="fas fa-users"></i> <span class="lang-zh">用户管理</span><span class="lang-en">Users</span></a>
            <a href="#" data-panel="assets"><i class="fas fa-box"></i> <span class="lang-zh">资产管理</span><span class="lang-en">Assets</span></a>
            <a href="#" data-panel="orders"><i class="fas fa-receipt"></i> <span class="lang-zh">订单管理</span><span class="lang-en">Orders</span></a>
            <a href="#" data-panel="settings"><i class="fas fa-cog"></i> <span class="lang-zh">系统设置</span><span class="lang-en">Settings</span></a>
        </nav>
    </aside>

    <!-- ===== 主内容 ===== -->
    <main class="main-content">
        <!-- 顶栏 -->
        <div class="topbar">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <h1 id="pageTitle"><span class="lang-zh">仪表盘</span><span class="lang-en">Dashboard</span></h1>
            </div>
            <div class="actions">
                <button onclick="toggleTheme()"><i class="fas fa-moon"></i> <span class="lang-zh">主题</span><span class="lang-en">Theme</span></button>
                <button onclick="toggleLanguage()"><i class="fas fa-globe"></i> <span class="lang-zh">语言</span><span class="lang-en">Lang</span></button>
                <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span class="lang-zh">登出</span><span class="lang-en">Logout</span></button>
            </div>
        </div>

        <!-- ===== 仪表盘面板 ===== -->
        <div id="panel-dashboard" class="panel active">
            <div class="stats-grid" id="statsGrid">
                <!-- 由 JavaScript 动态填充 -->
            </div>
            <div style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:var(--radius);padding:24px;text-align:center;color:var(--text-light);">
                <i class="fas fa-chart-line" style="font-size:2rem;opacity:0.3;display:block;margin-bottom:12px;"></i>
                <p><span class="lang-zh">欢迎来到后台管理系统，所有数据均与链上同步。</span><span class="lang-en">Welcome to the admin panel. All data is synced on-chain.</span></p>
            </div>
        </div>

        <!-- ===== 用户管理 ===== -->
        <div id="panel-users" class="panel">
            <div class="panel-header">
                <h2><span class="lang-zh">用户列表</span><span class="lang-en">User List</span></h2>
                <div class="panel-actions">
                    <input type="text" class="search-input" id="userSearch" placeholder="🔍 搜索 ID / 邮箱">
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>ID</th><th>邮箱</th><th>角色</th><th>注册时间</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== 资产管理 ===== -->
        <div id="panel-assets" class="panel">
            <div class="panel-header">
                <h2><span class="lang-zh">资产列表</span><span class="lang-en">Asset List</span></h2>
                <div class="panel-actions">
                    <input type="text" class="search-input" id="assetSearch" placeholder="🔍 搜索 ID / 名称">
                    <button class="btn btn-primary" onclick="openAssetModal()"><i class="fas fa-plus"></i> <span class="lang-zh">新增资产</span><span class="lang-en">Add Asset</span></button>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>ID</th><th>名称</th><th>价格</th><th>收益率</th><th>状态</th><th>操作</th></tr></thead>
                    <tbody id="assetTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== 订单管理 ===== -->
        <div id="panel-orders" class="panel">
            <div class="panel-header">
                <h2><span class="lang-zh">订单列表</span><span class="lang-en">Order List</span></h2>
                <div class="panel-actions">
                    <input type="text" class="search-input" id="orderSearch" placeholder="🔍 搜索 订单号 / 用户 / 资产">
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>订单号</th><th>用户</th><th>资产</th><th>数量</th><th>金额</th><th>时间</th></tr></thead>
                    <tbody id="orderTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== 系统设置 ===== -->
        <div id="panel-settings" class="panel">
            <div style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:var(--radius);padding:24px;max-width:600px;">
                <h3 style="margin-bottom:20px;"><span class="lang-zh">系统设置</span><span class="lang-en">System Settings</span></h3>
                <div class="form-group">
                    <label><span class="lang-zh">默认语言</span><span class="lang-en">Default Language</span></label>
                    <select id="settingLang" style="width:100%;padding:10px 16px;border-radius:30px;border:1px solid var(--border-color);background:var(--bg-light);color:var(--text-main);">
                        <option value="zh">中文</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><span class="lang-zh">主题模式</span><span class="lang-en">Theme Mode</span></label>
                    <select id="settingTheme" style="width:100%;padding:10px 16px;border-radius:30px;border:1px solid var(--border-color);background:var(--bg-light);color:var(--text-main);">
                        <option value="light">亮色</option>
                        <option value="dark">暗色</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="saveSettings()"><span class="lang-zh">保存设置</span><span class="lang-en">Save Settings</span></button>
            </div>
        </div>
    </main>

    <!-- ===== 资产模态框 ===== -->
    <div class="modal-overlay" id="assetModal">
        <div class="modal">
            <h3 id="assetModalTitle"><span class="lang-zh">新增资产</span><span class="lang-en">Add Asset</span></h3>
            <input type="hidden" id="editAssetId">
            <div class="form-group">
                <label><span class="lang-zh">资产 ID</span><span class="lang-en">Asset ID</span></label>
                <input type="number" id="assetId" placeholder="例如：1" step="1" min="1">
            </div>
            <div class="form-group">
                <label><span class="lang-zh">中文名称</span><span class="lang-en">Name (CN)</span></label>
                <input type="text" id="assetNameZh" placeholder="如：曼哈顿中心写字楼">
            </div>
            <div class="form-group">
                <label><span class="lang-zh">英文名称</span><span class="lang-en">Name (EN)</span></label>
                <input type="text" id="assetNameEn" placeholder="e.g., Manhattan Center Tower">
            </div>
            <div class="form-group">
                <label><span class="lang-zh">价格 (USD)</span><span class="lang-en">Price (USD)</span></label>
                <input type="number" id="assetPrice" step="0.01" placeholder="10.25">
            </div>
            <div class="form-group">
                <label><span class="lang-zh">年化收益率 (%)</span><span class="lang-en">Yield (%)</span></label>
                <input type="number" id="assetYield" step="0.1" placeholder="6.8">
            </div>
            <div class="form-group">
                <label><span class="lang-zh">状态</span><span class="lang-en">Status</span></label>
                <select id="assetStatus">
                    <option value="ico">ICO</option>
                    <option value="trading">Trading</option>
                </select>
            </div>
            <div class="btn-row">
                <button class="btn btn-outline" onclick="closeAssetModal()"><span class="lang-zh">取消</span><span class="lang-en">Cancel</span></button>
                <button class="btn btn-primary" id="saveAssetBtn"><span class="lang-zh">保存</span><span class="lang-en">Save</span></button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  1. 语言 / 主题管理
        // ============================================================
        (function() {
            let theme = localStorage.getItem('mohan_theme') || 'light';
            if (theme === 'dark') document.body.classList.add('dark');
            let lang = localStorage.getItem('mohan_lang') || 'zh';
            document.body.setAttribute('data-lang', lang);
        })();

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('mohan_theme', isDark ? 'dark' : 'light');
            const sel = document.getElementById('settingTheme');
            if (sel) sel.value = isDark ? 'dark' : 'light';
        }

        function toggleLanguage() {
            const current = document.body.getAttribute('data-lang');
            const newLang = current === 'zh' ? 'en' : 'zh';
            document.body.setAttribute('data-lang', newLang);
            localStorage.setItem('mohan_lang', newLang);
            const sel = document.getElementById('settingLang');
            if (sel) sel.value = newLang;
            updatePageTitle();
        }

        function updatePageTitle() {
            const activeLink = document.querySelector('.sidebar nav a.active');
            if (activeLink) {
                const panel = activeLink.dataset.panel;
                const titles = {
                    dashboard: { zh: '仪表盘', en: 'Dashboard' },
                    users: { zh: '用户管理', en: 'Users' },
                    assets: { zh: '资产管理', en: 'Assets' },
                    orders: { zh: '订单管理', en: 'Orders' },
                    settings: { zh: '系统设置', en: 'Settings' }
                };
                const lang = document.body.getAttribute('data-lang');
                const title = titles[panel] ? titles[panel][lang] : 'Dashboard';
                document.getElementById('pageTitle').innerHTML = title;
            }
        }

        // ============================================================
        //  2. 侧栏导航 & 面板切换
        // ============================================================
        document.querySelectorAll('.sidebar nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
                this.classList.add('active');
                const panel = this.dataset.panel;
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                const target = document.getElementById(`panel-${panel}`);
                if (target) target.classList.add('active');
                updatePageTitle();
                closeSidebar();
                if (panel === 'dashboard') loadStats();
                if (panel === 'users') loadUsers();
                if (panel === 'assets') loadAssets();
                if (panel === 'orders') loadOrders();
            });
        });

        // ============================================================
        //  3. 移动端侧栏控制
        // ============================================================
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        document.getElementById('menuToggle').addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        });
        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        overlay.addEventListener('click', closeSidebar);

        // ============================================================
        //  4. 模拟数据（包含订单号）
        // ============================================================
        const mockUsers = [
            { userId: 'user-1718000001', email: 'alice@demo.com', role: 'user', createdAt: '2026-06-01T10:00:00Z' },
            { userId: 'user-1718000002', email: 'bob@demo.com', role: 'user', createdAt: '2026-06-02T14:30:00Z' },
            { userId: 'admin-1718000000', email: 'admin@mohan.com', role: 'admin', createdAt: '2026-05-30T08:00:00Z' },
        ];

        const mockAssets = [
            { id: 1, nameZh: '曼哈顿中心写字楼', nameEn: 'Manhattan Center Tower', tokenPrice: 10.25, yield: 6.8, status: 'ico' },
            { id: 2, nameZh: '波音787-9 航空器', nameEn: 'Boeing 787-9 Aircraft', tokenPrice: 9.87, yield: 5.2, status: 'trading' },
            { id: 3, nameZh: '光伏电站特许经营权', nameEn: 'Solar Farm Concession', tokenPrice: 10.02, yield: 7.5, status: 'trading' },
        ];

        // 订单数据增加 orderId
        let mockOrders = [
            { orderId: 'ORD-20260603-001', userEmail: 'alice@demo.com', assetName: '曼哈顿中心写字楼', amount: 100, totalAmount: 1025, created_at: '2026-06-03T09:15:00Z' },
            { orderId: 'ORD-20260604-002', userEmail: 'bob@demo.com', assetName: '波音787-9 航空器', amount: 50, totalAmount: 493.5, created_at: '2026-06-04T16:20:00Z' },
        ];

        // ============================================================
        //  5. API 调用函数（模拟）
        // ============================================================
        async function apiRequest(endpoint, options = {}) {
            await new Promise(resolve => setTimeout(resolve, 300));
            const url = endpoint.replace(/^\//, '');
            if (url === 'api/admin/stats') {
                return { totalUsers: mockUsers.length, totalAssets: mockAssets.length, totalOrders: mockOrders.length, totalRevenue: mockOrders.reduce((sum, o) => sum + (o.totalAmount || 0), 0) };
            }
            if (url === 'api/admin/users') return mockUsers;
            if (url === 'api/admin/assets') return mockAssets;
            if (url === 'api/admin/orders') return mockOrders;
            // 增删改
            if (options.method === 'POST' && url === 'api/admin/assets') {
                const newAsset = JSON.parse(options.body);
                // 检查 ID 是否已存在
                if (mockAssets.some(a => a.id === newAsset.id)) {
                    throw new Error('资产 ID 已存在，请更换');
                }
                mockAssets.push(newAsset);
                return newAsset;
            }
            if (options.method === 'PUT' && url.startsWith('api/admin/assets/')) {
                const id = parseInt(url.split('/').pop());
                const index = mockAssets.findIndex(a => a.id === id);
                if (index === -1) throw new Error('Asset not found');
                const updated = JSON.parse(options.body);
                // 检查新 ID 是否与其他资产冲突（排除自身）
                if (updated.id && updated.id !== id && mockAssets.some(a => a.id === updated.id)) {
                    throw new Error('新 ID 已被其他资产占用');
                }
                mockAssets[index] = { ...mockAssets[index], ...updated };
                return mockAssets[index];
            }
            if (options.method === 'DELETE' && url.startsWith('api/admin/assets/')) {
                const id = parseInt(url.split('/').pop());
                const index = mockAssets.findIndex(a => a.id === id);
                if (index === -1) throw new Error('Asset not found');
                mockAssets.splice(index, 1);
                return { success: true };
            }
            return {};
        }

        // ============================================================
        //  6. 数据加载 + 搜索过滤
        // ============================================================
        async function loadStats() {
            try {
                const stats = await apiRequest('/api/admin/stats');
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="label">总用户</div><div class="value">${stats.totalUsers}</div></div>
                    <div class="stat-card"><div class="label">总资产</div><div class="value">${stats.totalAssets}</div></div>
                    <div class="stat-card"><div class="label">总订单</div><div class="value">${stats.totalOrders}</div></div>
                    <div class="stat-card"><div class="label">总交易额 (USD)</div><div class="value">$${stats.totalRevenue.toFixed(2)}</div></div>
                `;
            } catch(e) { console.warn(e); }
        }

        // 用户管理：加载并应用搜索过滤
        async function loadUsers() {
            try {
                const users = await apiRequest('/api/admin/users');
                const tbody = document.getElementById('userTableBody');
                // 保存原始数据以便过滤
                tbody.dataset.users = JSON.stringify(users);
                applyUserFilter();
            } catch(e) { console.warn(e); }
        }

        function applyUserFilter() {
            const tbody = document.getElementById('userTableBody');
            const users = JSON.parse(tbody.dataset.users || '[]');
            const keyword = document.getElementById('userSearch').value.toLowerCase().trim();
            const filtered = users.filter(u => {
                if (!keyword) return true;
                return u.userId.toLowerCase().includes(keyword) || u.email.toLowerCase().includes(keyword);
            });
            tbody.innerHTML = filtered.map(u => `
                <tr>
                    <td>${u.userId}</td>
                    <td>${u.email}</td>
                    <td>${u.role || 'user'}</td>
                    <td>${new Date(u.createdAt).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        // 资产管理：加载并应用搜索过滤
        async function loadAssets() {
            try {
                const assets = await apiRequest('/api/admin/assets');
                const tbody = document.getElementById('assetTableBody');
                tbody.dataset.assets = JSON.stringify(assets);
                applyAssetFilter();
            } catch(e) { console.warn(e); }
        }

        function applyAssetFilter() {
            const tbody = document.getElementById('assetTableBody');
            const assets = JSON.parse(tbody.dataset.assets || '[]');
            const keyword = document.getElementById('assetSearch').value.toLowerCase().trim();
            const filtered = assets.filter(a => {
                if (!keyword) return true;
                return a.id.toString().includes(keyword) || a.nameZh.toLowerCase().includes(keyword) || a.nameEn.toLowerCase().includes(keyword);
            });
            tbody.innerHTML = filtered.map(a => `
                <tr>
                    <td>${a.id}</td>
                    <td>${a.nameZh}</td>
                    <td>$${a.tokenPrice}</td>
                    <td>${a.yield}%</td>
                    <td><span class="status-badge ${a.status}">${a.status}</span></td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="editAsset(${a.id})">编辑</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteAsset(${a.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 订单管理：加载并应用搜索过滤
        async function loadOrders() {
            try {
                const orders = await apiRequest('/api/admin/orders');
                const tbody = document.getElementById('orderTableBody');
                tbody.dataset.orders = JSON.stringify(orders);
                applyOrderFilter();
            } catch(e) { console.warn(e); }
        }

        function applyOrderFilter() {
            const tbody = document.getElementById('orderTableBody');
            const orders = JSON.parse(tbody.dataset.orders || '[]');
            const keyword = document.getElementById('orderSearch').value.toLowerCase().trim();
            const filtered = orders.filter(o => {
                if (!keyword) return true;
                return o.orderId.toLowerCase().includes(keyword) ||
                       o.userEmail.toLowerCase().includes(keyword) ||
                       o.assetName.toLowerCase().includes(keyword);
            });
            tbody.innerHTML = filtered.map(o => `
                <tr>
                    <td>${o.orderId}</td>
                    <td>${o.userEmail}</td>
                    <td>${o.assetName}</td>
                    <td>${o.amount}</td>
                    <td>$${o.totalAmount ? o.totalAmount.toFixed(2) : '—'}</td>
                    <td>${new Date(o.created_at).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        // ============================================================
        //  7. 搜索事件绑定
        // ============================================================
        document.getElementById('userSearch').addEventListener('input', applyUserFilter);
        document.getElementById('assetSearch').addEventListener('input', applyAssetFilter);
        document.getElementById('orderSearch').addEventListener('input', applyOrderFilter);

        // ============================================================
        //  8. 资产增删改（支持修改 ID）
        // ============================================================
        function openAssetModal(data = null) {
            const modal = document.getElementById('assetModal');
            const title = document.getElementById('assetModalTitle');
            document.getElementById('editAssetId').value = data ? data.id : '';
            document.getElementById('assetId').value = data ? data.id : '';
            document.getElementById('assetNameZh').value = data ? data.nameZh : '';
            document.getElementById('assetNameEn').value = data ? data.nameEn : '';
            document.getElementById('assetPrice').value = data ? data.tokenPrice : '';
            document.getElementById('assetYield').value = data ? data.yield : '';
            document.getElementById('assetStatus').value = data ? data.status : 'ico';
            title.innerHTML = data ? '<span class="lang-zh">编辑资产</span><span class="lang-en">Edit Asset</span>' :
                                        '<span class="lang-zh">新增资产</span><span class="lang-en">Add Asset</span>';
            modal.classList.add('active');
        }

        function closeAssetModal() {
            document.getElementById('assetModal').classList.remove('active');
        }

        async function editAsset(id) {
            const assets = await apiRequest('/api/admin/assets');
            const asset = assets.find(a => a.id === id);
            if (asset) openAssetModal(asset);
        }

        async function deleteAsset(id) {
            if (!confirm('确定要删除该资产吗？')) return;
            try {
                await apiRequest(`/api/admin/assets/${id}`, { method: 'DELETE' });
                loadAssets();
            } catch(e) {
                alert('删除失败: ' + e.message);
            }
        }

        document.getElementById('saveAssetBtn').addEventListener('click', async function() {
            const id = document.getElementById('editAssetId').value;
            const newId = parseInt(document.getElementById('assetId').value);
            if (!newId || newId <= 0) {
                alert('请输入有效的资产 ID (正整数)');
                return;
            }
            const payload = {
                id: newId,
                nameZh: document.getElementById('assetNameZh').value,
                nameEn: document.getElementById('assetNameEn').value,
                tokenPrice: parseFloat(document.getElementById('assetPrice').value),
                yield: parseFloat(document.getElementById('assetYield').value),
                status: document.getElementById('assetStatus').value,
            };
            try {
                if (id) {
                    // 编辑：如果 ID 发生了变化，后端 PUT 会检查唯一性
                    await apiRequest(`/api/admin/assets/${id}`, {
                        method: 'PUT',
                        body: JSON.stringify(payload)
                    });
                } else {
                    await apiRequest('/api/admin/assets', {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                }
                closeAssetModal();
                loadAssets();
                alert(id ? '资产已更新' : '资产已添加');
            } catch(e) {
                alert('操作失败: ' + e.message);
            }
        });

        // ============================================================
        //  9. 设置保存
        // ============================================================
        function saveSettings() {
            const lang = document.getElementById('settingLang').value;
            const theme = document.getElementById('settingTheme').value;
            localStorage.setItem('mohan_lang', lang);
            localStorage.setItem('mohan_theme', theme);
            if (theme === 'dark') document.body.classList.add('dark');
            else document.body.classList.remove('dark');
            document.body.setAttribute('data-lang', lang);
            updatePageTitle();
            alert('设置已保存！');
        }

        // ============================================================
        //  10. 登出
        // ============================================================
        function logout() {
            localStorage.removeItem('adminUserId');
            window.location.href = 'index.html';
        }

        // ============================================================
        // 11. 初始化
        // ============================================================
        (function init() {
            const currentLang = localStorage.getItem('mohan_lang') || 'zh';
            const currentTheme = localStorage.getItem('mohan_theme') || 'light';
            document.getElementById('settingLang').value = currentLang;
            document.getElementById('settingTheme').value = currentTheme;
            loadStats();
            // 初始加载用户、资产、订单时也会自动填充表格
            loadUsers();
            loadAssets();
            loadOrders();
        })();
    </script>
</body>
</html>
